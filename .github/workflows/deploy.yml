name: CI/CD CAPACITACIONES-M - Preprod

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository }}-api
  IMAGE_FRONT: ghcr.io/${{ github.repository }}-front

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Log in al GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./back
          file: ./back/Dockerfile.back
          push: true
          tags: ${{ env.IMAGE_API }}:latest

      - name: Build y Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./front
          file: ./front/Dockerfile.front
          push: true
          tags: ${{ env.IMAGE_FRONT }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Fix permissions on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo mkdir -p /home/DOCKERS-PREPROD/CAPACITACIONES-M/
            sudo chown -R ${{ secrets.SERVER_USER }}:${{ secrets.SERVER_USER }} /home/DOCKERS-PREPROD/CAPACITACIONES-M/
            sudo chmod -R 775 /home/DOCKERS-PREPROD/CAPACITACIONES-M/

      - name: Copiar docker-compose al servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "/home/DOCKERS-PREPROD/CAPACITACIONES-M/"
          overwrite: true

      - name: Ejecutar despliegue vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/DOCKERS-PREPROD/CAPACITACIONES-M
            
            # Login en el registro de GitHub
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Limpiar contenedores antiguos para evitar conflictos
            docker compose down --remove-orphans || true
            
            # Borrado forzado por nombre (por si quedaron huérfanos de otras ejecuciones)
            docker rm -f capacitaciones-m_api capacitaciones-m_db capacitaciones-m_front || true

            # Actualizar imágenes y reiniciar contenedores de forma forzada
            docker compose pull
            docker compose up -d --force-recreate
            
            # --- Automatización de Base de Datos ---
            echo "Esperando 15 segundos a que los servicios estabilicen..."
            sleep 15
            
            # Asegurar consistencia del esquema (Añadir columnas faltantes)
            echo "Verificando consistencia del esquema..."
            docker exec capacitaciones-m_api node scripts/ensure_schema.js || echo "Skip ensure_schema"
            
            # Poblar base de datos (Opcional)
            # echo "Poblando base de datos..."
            # docker exec capacitaciones-m_api node src/seed.js || echo "Skip seed"
            
            # Limpieza de imágenes antiguas para optimizar espacio
            docker image prune -f
            
            echo "🚀 Sistema desplegado correctamente."
